<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Sun Soul Style</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.png">
  <link rel="stylesheet" href="/css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">

  <div class="login-card">
    <img src="/assets/logo.png" alt="Sun Soul Style Emblem" class="login-logo">
    <h1 class="login-title">Reset Password</h1>
    <p class="login-subtitle">Studio CMS Account Recovery</p>
    
    <form class="login-form" id="forgot-password-form">
      <div class="form-group" style="margin-bottom: 20px;">
        <label for="recovery-username">Admin Username</label>
        <input type="text" id="recovery-username" placeholder="Enter admin username" required autocomplete="username">
      </div>
      
      <button type="submit" class="btn-login" id="submit-btn">Send Reset Link</button>
      
      <div class="login-error" id="feedback-message" style="display: none; padding: 12px; font-size: 0.9rem; margin-top: 15px; text-align: center; border-radius: 2px;"></div>
    </form>
    
    <p style="margin-top: 30px; font-size: 0.8rem; opacity: 0.5;"><a href="/login.html" style="color: inherit; text-decoration: none;">&larr; Back to Login</a></p>
  </div>

  <script>
    document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('recovery-username').value;
      const feedback = document.getElementById('feedback-message');
      const submitBtn = document.getElementById('submit-btn');
      
      feedback.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      
      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        
        const data = await res.json();
        
        feedback.style.display = 'block';
        if (res.ok && data.success) {
          feedback.style.color = '#557A46'; // success green
          feedback.style.borderColor = '#557A46';
          feedback.textContent = data.message;
          document.getElementById('forgot-password-form').reset();
        } else {
          feedback.style.color = 'var(--color-terracotta)';
          feedback.textContent = data.error || 'Failed to submit request. Please try again.';
        }
      } catch (err) {
        console.error("Forgot password request failed:", err);
        feedback.style.display = 'block';
        feedback.style.color = 'var(--color-terracotta)';
        feedback.textContent = 'Connection error. Please check server logs.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
