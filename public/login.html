<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Sun Soul Style</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.png">
  <link rel="stylesheet" href="/css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">

  <div class="login-card">
    <img src="/assets/logo.png" alt="Sun Soul Style Emblem" class="login-logo">
    <h1 class="login-title">Studio Admin</h1>
    <p class="login-subtitle">Content Management System</p>
    
    <form class="login-form" id="login-form">
      <div class="form-group">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" placeholder="Enter username" required autocomplete="username">
      </div>
      
      <div class="form-group">
        <label for="login-password">Password</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input type="password" id="login-password" placeholder="Enter password" required autocomplete="current-password" style="flex-grow: 1; padding-right: 50px;">
          <button type="button" id="toggle-password" style="position: absolute; right: 12px; background: none; border: none; cursor: pointer; color: var(--color-olive); font-size: 0.85rem; font-weight: 500;" aria-label="Toggle password visibility">Show</button>
        </div>
      </div>
      
      <button type="submit" class="btn-login">Access Dashboard</button>
      
      <div style="margin-top: 15px; text-align: right;">
        <a href="/forgot-password.html" style="font-size: 0.8rem; color: var(--color-olive); text-decoration: none;">Forgot password?</a>
      </div>
      
      <div class="login-error" id="login-error">Invalid username or password.</div>
    </form>
    
    <p style="margin-top: 30px; font-size: 0.8rem; opacity: 0.5;"><a href="/" style="color: inherit; text-decoration: none;">&larr; Back to Live Website</a></p>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
