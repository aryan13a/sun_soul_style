<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Sun Soul Style</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <link rel="apple-touch-icon" href="/assets/logo.png">
  <link rel="stylesheet" href="/css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">

  <div class="login-card">
    <img src="/assets/logo.png" alt="Sun Soul Style Emblem" class="login-logo">
    <h1 class="login-title">Set New Password</h1>
    <p class="login-subtitle">Studio CMS Account Recovery</p>
    
    <div id="no-token-error" style="display: none; color: var(--color-terracotta); margin-bottom: 20px;">
      <strong>Error:</strong> No reset token was found in the URL. Please verify your email link or send a new request.
      <p style="margin-top: 20px;"><a href="/forgot-password.html" class="btn-login" style="display: block; text-decoration: none; color: white;">Request New Link</a></p>
    </div>

    <form class="login-form" id="reset-password-form" style="display: none;">
      <input type="hidden" id="reset-token">
      
      <div class="form-group">
        <label for="new-password">New Password</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input type="password" id="new-password" placeholder="Enter new password" required autocomplete="new-password" style="flex-grow: 1; padding-right: 50px;">
          <button type="button" id="toggle-new-password" style="position: absolute; right: 12px; background: none; border: none; cursor: pointer; color: var(--color-olive); font-size: 0.85rem; font-weight: 500;">Show</button>
        </div>
      </div>

      <div class="form-group" style="margin-top: 15px; margin-bottom: 20px;">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm new password" required autocomplete="new-password">
      </div>
      
      <button type="submit" class="btn-login" id="submit-btn">Reset Password</button>
      
      <div class="login-error" id="feedback-message" style="display: none; padding: 12px; font-size: 0.9rem; margin-top: 15px; text-align: center; border-radius: 2px;"></div>
    </form>
    
    <p style="margin-top: 30px; font-size: 0.8rem; opacity: 0.5;"><a href="/login.html" style="color: inherit; text-decoration: none;">&larr; Back to Login</a></p>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    const form = document.getElementById('reset-password-form');
    const noTokenError = document.getElementById('no-token-error');
    
    if (token) {
      document.getElementById('reset-token').value = token;
      form.style.display = 'flex';
    } else {
      noTokenError.style.display = 'block';
    }
    
    // Password toggle
    const toggleBtn = document.getElementById('toggle-new-password');
    const passInput = document.getElementById('new-password');
    if (toggleBtn && passInput) {
      toggleBtn.addEventListener('click', () => {
        const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passInput.setAttribute('type', type);
        toggleBtn.textContent = type === 'password' ? 'Show' : 'Hide';
      });
    }
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const feedback = document.getElementById('feedback-message');
      const submitBtn = document.getElementById('submit-btn');
      
      feedback.style.display = 'none';
      
      if (newPassword !== confirmPassword) {
        feedback.style.display = 'block';
        feedback.style.color = 'var(--color-terracotta)';
        feedback.textContent = 'Passwords do not match.';
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Resetting...';
      
      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        
        const data = await res.json();
        
        feedback.style.display = 'block';
        if (res.ok) {
          feedback.style.color = '#557A46'; // success green
          feedback.textContent = data.message || 'Password reset successfully.';
          form.reset();
          // Redirect to login after 3 seconds
          setTimeout(() => {
            window.location.href = '/login.html';
          }, 3000);
        } else {
          feedback.style.color = 'var(--color-terracotta)';
          feedback.textContent = data.error || 'Failed to reset password. Please request a new link.';
        }
      } catch (err) {
        console.error("Reset password failed:", err);
        feedback.style.display = 'block';
        feedback.style.color = 'var(--color-terracotta)';
        feedback.textContent = 'Connection error. Please try again.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
